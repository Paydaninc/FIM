name: EAS Build

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/invoice-maker-app/**'
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('artifacts/invoice-maker-app/package.json') }}
          restore-keys: gradle-

      - name: Install dependencies
        run: pnpm install

      - name: Remove Solana native modules (transitive deps from @clerk/clerk-js, crash on Android)
        run: |
          for pkg in \
            "solana-mobile+mobile-wallet-adapter-protocol" \
            "solana-mobile+mobile-wallet-adapter-protocol-web3js" \
            "solana-mobile+wallet-adapter-mobile"; do
            find node_modules/.pnpm -path "*${pkg}*" \( \
              -name "expo-module.config.json" -o \
              -name "react-native.config.js" \
            \) -exec rm -f {} \; -print
          done
          echo "Solana native module configs removed."

      - name: Expo Prebuild (generate native Android project)
        working-directory: artifacts/invoice-maker-app
        env:
          EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Z3VpZGluZy1ndWxsLTc3LmNsZXJrLmFjY291bnRzLmRldiQ
          EXPO_PUBLIC_DOMAIN: 5dd2e180-0760-4879-b952-1074eae29f8c-00-1j31dpkrowdt1.riker.replit.dev
        run: npx expo prebuild --platform android --clean --no-install

      - name: Sign release build with debug keystore
        working-directory: artifacts/invoice-maker-app/android
        run: |
          # Patch build.gradle: sign the release buildType with the debug keystore so
          # assembleRelease bundles JS without requiring a production certificate.
          sed -i 's/signingConfig signingConfigs\.release/signingConfig signingConfigs.debug/g' app/build.gradle
          echo "Patched signing config:"
          grep -A2 "buildTypes" app/build.gradle | head -20

      - name: Build release APK via Gradle
        working-directory: artifacts/invoice-maker-app/android
        run: ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4g

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.run_number }}
          path: artifacts/invoice-maker-app/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
