name: EAS Build

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/invoice-maker-app/**'
  workflow_dispatch:

jobs:
  build:
    name: EAS Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install

      - name: Build with EAS (production APK)
        working-directory: artifacts/invoice-maker-app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_BUILD_NO_EXPO_GO_WARNING: true
        run: |
          npx eas-cli build \
            --platform android \
            --profile production \
            --non-interactive \
            --json \
            --no-wait \
            2>&1 | tee /tmp/eas-output.txt
          cat /tmp/eas-output.txt

      - name: Print EAS build URL
        run: |
          python3 - <<'PYEOF'
          import json, re, pathlib
          raw = pathlib.Path("/tmp/eas-output.txt").read_text()
          # Try to parse the JSON array EAS outputs with --json
          try:
            builds = json.loads(re.search(r'\[.*\]', raw, re.DOTALL).group())
            for b in builds:
              print("Build ID  :", b.get("id"))
              print("Status    :", b.get("status"))
              print("Build URL :", b.get("buildUrl") or b.get("url") or "(pending)")
              print("EAS page  :", f"https://expo.dev/accounts/pdanielyan/projects/invoice-maker-app/builds/{b.get('id')}")
          except Exception as e:
            print("Could not parse JSON, raw output:")
            print(raw[-2000:])
          PYEOF
