name: OTA Update

# Publishes an over-the-air JS bundle to all users on the production channel
# every time code is merged to main — no app store release needed.

on:
  push:
    branches:
      - main
    paths:
      - 'artifacts/invoice-maker-app/**'

jobs:
  publish:
    name: Publish OTA Update
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artifacts/invoice-maker-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install

      - name: Publish OTA update
        run: |
          eas update \
            --channel production \
            --message "Auto publish: ${{ github.sha }}" \
            --non-interactive

